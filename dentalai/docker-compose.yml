version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload in dev; remove for prod image
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis placeholder — wired up when the AI agent layer is added
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
